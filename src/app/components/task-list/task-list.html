<div class="container mt-5">
  <div class="card shadow-sm">
    <div class="card-header bg-white">
      <h5 class="mb-0 text-primary">רשימת משימות</h5>
    </div>
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>מספר</th>
            <th>כותרת</th>
            <th>תיאור</th>
            <th>עדיפות</th>
            <th>תאריך יעד</th>
            <th>סטטוס</th>
            <th class="text-center">פעולות</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let task of (tasks$ | async); let i = index">
            <td>{{ i + 1 }}</td>
            <td class="fw-bold">{{ task.title }}</td>
            <td class="text-muted small">{{ task.description || '-' }}</td>
            <td>
              <span class="badge" [ngClass]="{
                'bg-danger': task.priority === 'גבוהה',
                'bg-warning text-dark': task.priority === 'בינונית',
                'bg-info text-dark': task.priority === 'נמוכה'
              }">{{ task.priority }}</span>
            </td>
            <td>{{ task.dueDate | date:'dd/MM/yyyy' }}</td>
            <td>
            <span class="badge" [ngClass]="{
                'bg-success': task.status === 'הושלמה',
                'bg-warning text-dark': task.status === 'בתהליך',
                'bg-secondary': task.status === 'ממתינה'
            }">{{ task.status }}</span>
            </td>
            <td class="text-center">
              <button class="btn btn-outline-primary btn-sm me-2" (click)="onEdit(task)">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-outline-danger btn-sm" (click)="onDelete(task.id)">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
          <tr *ngIf="(tasks$ | async)?.length === 0">
            <td colspan="7" class="text-center py-4 text-muted">אין משימות כרגע! הוסיפו משימה חדשה למעלה.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
